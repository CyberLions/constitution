name: Build and Publish Constitution PDF

on:
  push:
    paths:
      - constitution.md
  release:
    types: [published]

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    name: Build PDF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra

      - name: Generate PDF
        run: |
          pandoc constitution.md \
            -o constitution.pdf \
            --pdf-engine=pdflatex \
            -V geometry:margin=1in \
            -V fontsize=11pt \
            -V documentclass=article

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: constitution-pdf
          path: constitution.pdf
          
  create-release:
      needs: build-pdf
      if: github.event_name == 'push'
      runs-on: ubuntu-latest
      steps:
        - name: Download Artifact
          uses: actions/download-artifact@v4
          with:
            name: constitution-pdf

        - name: Get date
          id: date
          run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

        - name: Create Release and Upload PDF
          uses: softprops/action-gh-release@v2
          with:
            tag_name: constitution-${{ steps.date.outputs.date }}-${{ github.run_number }}
            name: "constitution-${{ steps.date.outputs.date }}"
            files: constitution.pdf
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}